<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>MusicIk | Playlist</title>

    <link rel="stylesheet" href="css/playlist.css">

</head>

<body>

    <div class="playlist-container">

        <div class="playlist-header">

            <img id="playlistImage" src="" alt="Playlist">

            <div>

                <h1 id="playlistTitle"></h1>

                <p id="playlistDescription"></p>

                <button id="playAllBtn">
                    ▶ Reproducir todo
                </button>

            </div>

        </div>

        <div id="songsContainer"></div>

<footer class="player-bar">

    <div class="player-track">

        <img id="playerCover" src="" alt="">

        <div>

            <p class="p-title" id="playerTitle">Selecciona una canción</p>

            <p class="p-artist" id="playerArtist">MusicIk</p>

        </div>

    </div>

    <div class="player-center">

        <div class="player-controls">

            <button class="ctrl" id="prevBtn">⏮</button>

            <button class="ctrl play" id="playBtn">▶</button>

            <button class="ctrl" id="nextBtn">⏭</button>

        </div>

        <div class="progress-row">

            <span id="curTime">0:00</span>

            <input
                type="range"
                id="progressBar"
                value="0"
                min="0"
                max="100">

            <span id="durTime">0:00</span>

        </div>

    </div>

</footer>

<audio id="audioPlayer"></audio>

<script src="js/playlist.js"></script>

</body>

</html>
