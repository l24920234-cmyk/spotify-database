services:

  mysql:
    image: mysql:8.0
    container_name: spotify_mysql
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: spotify_db
      MYSQL_USER: spotify_user
      MYSQL_PASSWORD: spotify_pass

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql

    networks:
      - spotify_network


  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: spotify_phpmyadmin
    restart: always

    depends_on:
      - mysql

    ports:
      - "8080:80"

    environment:
      PMA_HOST: mysql
      MYSQL_ROOT_PASSWORD: root

    networks:
      - spotify_network


  backend:
    build: ./backend
    container_name: spotify_backend
    restart: always

    ports:
      - "3000:3000"

    depends_on:
      - mysql

    networks:
      - spotify_network


  nginx:
    image: nginx:latest
    container_name: spotify_nginx
    restart: always

    ports:
      - "80:80"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

    depends_on:
      - backend

    networks:
      - spotify_network


volumes:
  mysql_data:


networks:
  spotify_network: