<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MusicIk — Inicio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/home.css">
</head>
<body>

<div class="app">

  <aside class="sidebar">

    <div class="brand">
      <span class="brand-icon">♪</span>
      <span class="brand-name">MusicIk</span>
    </div>

    <nav class="nav">
      <a href="home.html" class="nav-item active" data-src="views/home-content.html">
        <svg viewBox="0 0 24 24"><path d="M3 11.5 12 4l9 7.5V20a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1z"/></svg>
        <span>Inicio</span>
      </a>
      <a href="explorar.html" class="nav-item" data-src="views/explorar-content.html">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
        <span>Explorar</span>
      </a>
      <a href="favoritos.html" class="nav-item" data-src="views/favoritos-content.html">
        <svg viewBox="0 0 24 24"><path d="M12 20s-7-4.35-9.5-8.5C.7 8 2 4.5 5.5 4.5 8 4.5 9.5 6 12 8.5c2.5-2.5 4-4 6.5-4C22 4.5 23.3 8 21.5 11.5 19 15.65 12 20 12 20z"/></svg>
        <span>Favoritos</span>
      </a>
      <a href="playlists.html" class="nav-item" data-src="views/playlists-content.html">
        <svg viewBox="0 0 24 24"><path d="M4 6h13M4 12h13M4 18h9"/><circle cx="19" cy="16" r="2.5"/><path d="M19 6v10"/></svg>
        <span>Playlists</span>
      </a>
      <a href="albumes.html" class="nav-item" data-src="views/albumes-content.html">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="2.5"/></svg>
        <span>Álbumes</span>
      </a>
      <a href="artistas.html" class="nav-item" data-src="views/artistas-content.html">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4.4 3.6-7 8-7s8 2.6 8 7"/></svg>
        <span>Artistas</span>
      </a>
      <a href="podcasts.html" class="nav-item" data-src="views/podcasts-content.html">
        <svg viewBox="0 0 24 24"><rect x="4" y="3" width="16" height="12" rx="2"/><path d="M8 21h8M12 15v6"/></svg>
        <span>Podcasts</span>
      </a>
    </nav>

    <a href="#" class="nav-item settings">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.7 1.7 0 0 0-1.87-.34 1.7 1.7 0 0 0-1 1.55V21a2 2 0 1 1-4 0v-.09a1.7 1.7 0 0 0-1.11-1.55 1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.7 1.7 0 0 0 .34-1.87 1.7 1.7 0 0 0-1.55-1H3a2 2 0 1 1 0-4h.09A1.7 1.7 0 0 0 4.64 9.4a1.7 1.7 0 0 0-.34-1.87l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.7 1.7 0 0 0 1.87.34H9a1.7 1.7 0 0 0 1-1.55V3a2 2 0 1 1 4 0v.09a1.7 1.7 0 0 0 1 1.55 1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.7 1.7 0 0 0-.34 1.87V9a1.7 1.7 0 0 0 1.55 1H21a2 2 0 1 1 0 4h-.09a1.7 1.7 0 0 0-1.51 1z"/></svg>
      <span>Configuración</span>
    </a>

    <a href="#" id="logoutBtn" class="nav-item">
      <svg viewBox="0 0 24 24">
        <path d="M16 17l5-5-5-5M21 12H9"/>
        <path d="M13 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h8"/>
      </svg>
      <span>Cerrar sesión</span>
    </a>

    <div class="now-card">
      <div class="now-cover">
        <img id="miniCover" src="assets/images/covers/dreams.jpg" alt="">
        <div class="eq"><span></span><span></span><span></span></div>
      </div>
      <div class="now-info">
        <p class="now-title" id="miniTitle">Dreams</p>
        <p class="now-artist" id="miniArtist">Imagine Music</p>
      </div>
      <button class="like-btn active" aria-label="Me gusta">
        <svg viewBox="0 0 24 24"><path d="M12 20s-7-4.35-9.5-8.5C.7 8 2 4.5 5.5 4.5 8 4.5 9.5 6 12 8.5c2.5-2.5 4-4 6.5-4C22 4.5 23.3 8 21.5 11.5 19 15.65 12 20 12 20z"/></svg>
      </button>
    </div>
  </aside>

  <iframe class="main" id="contentFrame" src="views/home-content.html" title="Contenido"></iframe>

  <aside class="right-panel">
    <div class="panel-block">
      <h3>Escuchado recientemente</h3>
      <ul class="recent-list" id="recentList"></ul>
    </div>

    <div class="panel-block">
      <div class="row-head tight">
        <h3>Playlists para ti</h3>
        <a href="#" class="see-all">Ver todo</a>
      </div>
      <ul class="playlist-list" id="playlistList"></ul>
    </div>
  </aside>

  <footer class="player-bar">

    <div class="player-track">
      <img id="playerCover" src="assets/images/covers/dreams.jpg" alt="">
      <div>
        <p class="p-title" id="playerTitle">Dreams</p>
        <p class="p-artist" id="playerArtist">Imagine Music</p>
      </div>
      <button class="like-btn active" id="playerLike" aria-label="Me gusta">
        <svg viewBox="0 0 24 24"><path d="M12 20s-7-4.35-9.5-8.5C.7 8 2 4.5 5.5 4.5 8 4.5 9.5 6 12 8.5c2.5-2.5 4-4 6.5-4C22 4.5 23.3 8 21.5 11.5 19 15.65 12 20 12 20z"/></svg>
      </button>
    </div>

    <div class="player-center">
      <div class="player-controls">
        <button class="ctrl" aria-label="Aleatorio" id="shuffleBtn">
          <svg viewBox="0 0 24 24"><path d="M4 6h4l7 12h5M4 18h4l2.5-4.3M15 6h5l-2-2m2 2-2 2M15 18h5l-2 2m2-2-2-2"/></svg>
        </button>
        <button class="ctrl" id="prevBtn" aria-label="Anterior">
          <svg viewBox="0 0 24 24"><path d="M19 5v14L8 12zM6 5v14"/></svg>
        </button>
        <button class="ctrl play" id="playBtn" aria-label="Reproducir">
          <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          <svg id="pauseIcon" viewBox="0 0 24 24" style="display:none"><path d="M7 5h4v14H7zM13 5h4v14h-4z"/></svg>
        </button>
        <button class="ctrl" id="nextBtn" aria-label="Siguiente">
          <svg viewBox="0 0 24 24"><path d="M5 5v14l11-7zM18 5v14"/></svg>
        </button>
        <button class="ctrl" aria-label="Repetir" id="repeatBtn">
          <svg viewBox="0 0 24 24"><path d="M17 2l4 4-4 4M3 11V9a4 4 0 0 1 4-4h14M7 22l-4-4 4-4M21 13v2a4 4 0 0 1-4 4H3"/></svg>
        </button>
      </div>

      <div class="progress-row">
        <span class="time" id="curTime">0:00</span>
        <div class="progress-track" id="progressTrack">
          <div class="progress-fill" id="progressFill"></div>
          <div class="progress-handle" id="progressHandle"></div>
        </div>
        <span class="time" id="durTime">0:00</span>
      </div>
    </div>

    <div class="player-extra">
      <button class="ctrl" aria-label="Volumen">
        <svg viewBox="0 0 24 24"><path d="M4 9v6h4l5 5V4L8 9z"/><path d="M17 8a5 5 0 0 1 0 8"/></svg>
      </button>
      <div class="volume-track" id="volumeTrack">
        <div class="volume-fill" id="volumeFill"></div>
        <div class="volume-handle" id="volumeHandle"></div>
      </div>
      <button class="ctrl" aria-label="Cola de reproducción">
        <svg viewBox="0 0 24 24"><path d="M4 6h11M4 12h11M4 18h6"/><path d="M17 15l3 3 3-3M20 6v12"/></svg>
      </button>
      <button class="ctrl" aria-label="Expandir" id="expandBtn">
        <svg viewBox="0 0 24 24"><path d="m6 15 6-6 6 6"/></svg>
      </button>
    </div>
  </footer>

</div>

<audio id="audioPlayer"></audio>
<script src="js/player.js"></script>
<script src="js/nav.js"></script>
</body>
</html>
